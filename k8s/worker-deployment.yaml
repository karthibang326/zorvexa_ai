apiVersion: apps/v1
kind: Deployment
metadata:
  name: astraops-worker
  namespace: astraops
spec:
  replicas: 2
  selector:
    matchLabels:
      app: astraops-worker
  template:
    metadata:
      labels:
        app: astraops-worker
    spec:
      containers:
        - name: worker
          image: ghcr.io/your-org/astraops-worker:latest
          envFrom:
            - configMapRef:
                name: astraops-config
            - secretRef:
                name: astraops-secrets
          resources:
            requests:
              cpu: "200m"
              memory: "256Mi"
            limits:
              cpu: "1000m"
              memory: "1Gi"
