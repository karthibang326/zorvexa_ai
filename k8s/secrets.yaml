apiVersion: v1
kind: Secret
metadata:
  name: astraops-secrets
  namespace: astraops
type: Opaque
stringData:
  DATABASE_URL: "postgresql://astraops:password@postgres:5432/astraops?schema=public"
  REDIS_URL: "redis://redis:6379"
  JWT_SECRET: "replace-with-strong-secret"
  OPENAI_API_KEY: "replace-openai-key"
  STRIPE_SECRET_KEY: "replace-stripe-secret"
  STRIPE_WEBHOOK_SECRET: "replace-stripe-webhook-secret"
