apiVersion: apps/v1
kind: Deployment
metadata:
  name: astraops-backend
  namespace: astraops
spec:
  replicas: 2
  selector:
    matchLabels:
      app: astraops-backend
  template:
    metadata:
      labels:
        app: astraops-backend
    spec:
      containers:
        - name: backend
          image: ghcr.io/your-org/astraops-backend:latest
          ports:
            - containerPort: 5002
          envFrom:
            - configMapRef:
                name: astraops-config
            - secretRef:
                name: astraops-secrets
          readinessProbe:
            httpGet:
              path: /health
              port: 5002
            initialDelaySeconds: 8
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 5002
            initialDelaySeconds: 20
            periodSeconds: 15
          resources:
            requests:
              cpu: "250m"
              memory: "256Mi"
            limits:
              cpu: "1000m"
              memory: "1Gi"
