apiVersion: apps/v1
kind: Deployment
metadata:
  name: astraops-backend
  namespace: astraops
spec:
  replicas: 3
  selector:
    matchLabels:
      app: astraops-backend
  template:
    metadata:
      labels:
        app: astraops-backend
    spec:
      containers:
        - name: astraops-backend
          image: <account-id>.dkr.ecr.<region>.amazonaws.com/astraops-backend:latest
          ports:
            - containerPort: 5002
          env:
            - name: NODE_ENV
              value: "production"
            - name: AUTH_PROVIDER
              value: "auth0"
            - name: PORT
              value: "5002"
          envFrom:
            - secretRef:
                name: astraops-backend-secrets
          readinessProbe:
            httpGet:
              path: /health
              port: 5002
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 5002
            initialDelaySeconds: 20
            periodSeconds: 15
---
apiVersion: v1
kind: Service
metadata:
  name: astraops-backend
  namespace: astraops
spec:
  selector:
    app: astraops-backend
  ports:
    - name: http
      port: 80
      targetPort: 5002
  type: ClusterIP

