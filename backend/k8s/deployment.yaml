apiVersion: apps/v1
kind: Deployment
metadata:
  name: quantumops-backend
spec:
  replicas: 2
  selector:
    matchLabels:
      app: quantumops-backend
  template:
    metadata:
      labels:
        app: quantumops-backend
    spec:
      containers:
        - name: backend
          image: quantumops/backend:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 5002
          env:
            - name: NODE_ENV
              value: production
            - name: PORT
              value: "5002"
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: quantumops-secrets
                  key: DATABASE_URL
            - name: REDIS_URL
              value: redis://redis:6379
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: quantumops-secrets
                  key: JWT_SECRET

