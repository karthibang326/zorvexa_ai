name: AstraOps CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAMESPACE: ${{ github.repository_owner }}

jobs:
  test-and-build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install frontend dependencies
        run: npm ci

      - name: Run frontend tests
        run: npm run test

      - name: Build frontend
        run: npm run build

      - name: Install backend dependencies
        run: npm ci
        working-directory: backend

      - name: Run backend tests
        run: npm test
        working-directory: backend

      - name: Build backend
        run: npm run build
        working-directory: backend

      - name: Login to registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push backend image
        if: github.event_name != 'pull_request'
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAMESPACE }}/astraops-backend:${{ github.sha }}

      - name: Build and push worker image
        if: github.event_name != 'pull_request'
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          file: ./backend/Dockerfile.worker
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAMESPACE }}/astraops-worker:${{ github.sha }}

      - name: Build and push frontend image
        if: github.event_name != 'pull_request'
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile.frontend
          push: true
          build-args: |
            VITE_WORKFLOWS_API_URL=${{ secrets.VITE_WORKFLOWS_API_URL }}
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAMESPACE }}/astraops-frontend:${{ github.sha }}

  deploy:
    if: github.event_name != 'pull_request'
    needs: test-and-build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup kubectl
        uses: azure/setup-kubectl@v4
        with:
          version: latest

      - name: Configure kubeconfig
        run: |
          mkdir -p ~/.kube
          echo "${KUBE_CONFIG_DATA}" | base64 -d > ~/.kube/config
        env:
          KUBE_CONFIG_DATA: ${{ secrets.KUBE_CONFIG_DATA }}

      - name: Update image tags
        run: |
          sed -i "s|ghcr.io/your-org/astraops-backend:latest|ghcr.io/${{ github.repository_owner }}/astraops-backend:${{ github.sha }}|g" k8s/backend-deployment.yaml
          sed -i "s|ghcr.io/your-org/astraops-worker:latest|ghcr.io/${{ github.repository_owner }}/astraops-worker:${{ github.sha }}|g" k8s/worker-deployment.yaml
          sed -i "s|ghcr.io/your-org/astraops-frontend:latest|ghcr.io/${{ github.repository_owner }}/astraops-frontend:${{ github.sha }}|g" k8s/frontend-deployment.yaml

      - name: Deploy manifests
        run: |
          kubectl apply -f k8s/namespace.yaml
          kubectl apply -f k8s/configmap.yaml
          kubectl apply -f k8s/secrets.yaml
          kubectl apply -f k8s/backend-deployment.yaml
          kubectl apply -f k8s/backend-service.yaml
          kubectl apply -f k8s/worker-deployment.yaml
          kubectl apply -f k8s/worker-hpa.yaml
          kubectl apply -f k8s/frontend-deployment.yaml
          kubectl apply -f k8s/frontend-service.yaml
          kubectl apply -f k8s/ingress.yaml
