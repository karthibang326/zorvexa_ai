name: AstraOps CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAMESPACE: ${{ github.repository_owner }}

jobs:
  # ── Frontend: lint, test with coverage, a11y ─────────────────────────────
  frontend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run frontend tests with coverage
        run: npm run test -- --coverage --reporter=verbose
        env:
          NODE_ENV: test

      - name: Upload frontend coverage
        if: always()
        uses: codecov/codecov-action@v4
        with:
          flags: frontend
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: false

      - name: Build frontend
        run: npm run build
        env:
          VITE_WORKFLOWS_API_URL: ${{ secrets.VITE_WORKFLOWS_API_URL }}

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run a11y tests
        run: npx playwright test tests/a11y.spec.ts --reporter=html
        continue-on-error: false   # Hard gate — a11y failures block merge.

      - name: Upload Playwright a11y report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-a11y-report
          path: playwright-report/
          retention-days: 7

  # ── Backend: test with coverage, validate migrations ─────────────────────
  backend:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: quantumops_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432
      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install backend dependencies
        run: npm ci
        working-directory: backend

      - name: Validate migration (Expand/Contract check)
        run: npm run db:migrate-safe:dry
        working-directory: backend
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/quantumops_test
          NODE_ENV: test

      - name: Run backend tests with coverage
        run: npm test -- --coverage
        working-directory: backend
        env:
          DATABASE_URL: postgresql://postgres:postgres@localhost:5432/quantumops_test
          REDIS_URL: redis://localhost:6379
          NODE_ENV: test
          JWT_SECRET: test-secret-ci
          AUTH_PROVIDER: local
          AUTH_DEV_BYPASS: "false"

      - name: Upload backend coverage
        if: always()
        uses: codecov/codecov-action@v4
        with:
          flags: backend
          directory: backend/coverage
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: false

      - name: Build backend
        run: npm run build
        working-directory: backend

  # ── Docker build & push ───────────────────────────────────────────────────
  docker:
    if: github.event_name != 'pull_request'
    needs: [frontend, backend]
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - name: Login to registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push backend image
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          file: ./backend/Dockerfile
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAMESPACE }}/astraops-backend:${{ github.sha }}

      - name: Build and push worker image
        uses: docker/build-push-action@v6
        with:
          context: ./backend
          file: ./backend/Dockerfile.worker
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAMESPACE }}/astraops-worker:${{ github.sha }}

      - name: Build and push frontend image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile.frontend
          push: true
          build-args: |
            VITE_WORKFLOWS_API_URL=${{ secrets.VITE_WORKFLOWS_API_URL }}
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAMESPACE }}/astraops-frontend:${{ github.sha }}

  # ── Deploy to Kubernetes ──────────────────────────────────────────────────
  deploy:
    if: github.event_name != 'pull_request'
    needs: docker
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: azure/setup-kubectl@v4
        with:
          version: latest

      - name: Configure kubeconfig
        run: |
          mkdir -p ~/.kube
          echo "${KUBE_CONFIG_DATA}" | base64 -d > ~/.kube/config
        env:
          KUBE_CONFIG_DATA: ${{ secrets.KUBE_CONFIG_DATA }}

      - name: Run safe migration deploy
        run: |
          kubectl exec deploy/astraops-backend -- \
            node dist/scripts/migrate-safe.js || \
          echo "Migration step skipped (pod not ready or migration not pending)"

      - name: Update image tags
        run: |
          sed -i "s|ghcr.io/your-org/astraops-backend:latest|ghcr.io/${{ github.repository_owner }}/astraops-backend:${{ github.sha }}|g" k8s/backend-deployment.yaml
          sed -i "s|ghcr.io/your-org/astraops-worker:latest|ghcr.io/${{ github.repository_owner }}/astraops-worker:${{ github.sha }}|g" k8s/worker-deployment.yaml
          sed -i "s|ghcr.io/your-org/astraops-frontend:latest|ghcr.io/${{ github.repository_owner }}/astraops-frontend:${{ github.sha }}|g" k8s/frontend-deployment.yaml

      - name: Deploy manifests
        run: |
          kubectl apply -f k8s/namespace.yaml
          kubectl apply -f k8s/configmap.yaml
          kubectl apply -f k8s/secrets.yaml
          kubectl apply -f k8s/backend-deployment.yaml
          kubectl apply -f k8s/backend-service.yaml
          kubectl apply -f k8s/worker-deployment.yaml
          kubectl apply -f k8s/worker-hpa.yaml
          kubectl apply -f k8s/frontend-deployment.yaml
          kubectl apply -f k8s/frontend-service.yaml
          kubectl apply -f k8s/ingress.yaml
